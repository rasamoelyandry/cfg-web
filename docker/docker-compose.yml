version: "3.9"

services:

  # ─── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cfg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cfg}
      POSTGRES_USER: ${POSTGRES_USER:-cfg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cfg}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cfg-internal

  # ─── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cfg-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --save 60 1
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cfg-internal

  # ─── Backend Spring Boot ────────────────────────────────────────
  backend:
    build:
      context: ../cfg-backend
      dockerfile: Dockerfile
    container_name: cfg-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-cfg}
      DB_USERNAME: ${POSTGRES_USER:-cfg}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY_MS: ${JWT_ACCESS_EXPIRY_MS:-900000}
      JWT_REFRESH_EXPIRY_MS: ${JWT_REFRESH_EXPIRY_MS:-604800000}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://app.cfg.mg}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    networks:
      - cfg-internal
    volumes:
      - backend_logs:/app/logs

  # ─── Frontend React ─────────────────────────────────────────────
  frontend:
    build:
      context: ../cfg-web
      dockerfile: Dockerfile
    container_name: cfg-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - cfg-internal

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cfg-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - cfg-internal
      - cfg-public

volumes:
  postgres_data:
  redis_data:
  backend_logs:
  nginx_cache:

networks:
  cfg-internal:
    driver: bridge
  cfg-public:
    driver: bridge
